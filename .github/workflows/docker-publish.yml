# Build and publish the Mica runtime image to GHCR.
#
# Triggers:
#   - push to mica-lite / main (produces :latest on default branch,
#     plus a branch-named tag for testing non-default branches)
#   - git tags matching v* (produces :X.Y.Z semver tags)
#   - manual workflow_dispatch (for on-demand rebuilds)
#
# Runs on GitHub's free arm64 runners (public repos only). DGX Spark is
# arm64; we build linux/arm64 exclusively. Multi-arch comes in a later
# release when we broaden access beyond Spark.
name: Publish runtime image

on:
  push:
    branches: [mica-lite, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mica
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
