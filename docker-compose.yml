# Mica stack — supports two topologies from one compose file.
#
#   vLLM topology (two-container, default via wrapper):
#     `docker compose --profile vllm up`
#     mica       — frontend (Vite, :5173) + backend (Node, :3002) +
#                  voice sidecars. Builds from ./Dockerfile.
#     mica-vllm  — Qwen3.6-35B-A3B-NVFP4 served by upstream vLLM.
#                  Profile-gated; only starts in `--profile vllm`.
#
#   llama topology (one-container):
#     `docker compose up`
#     mica       — same image, plus llama-server spawned inside the
#                  container on first chat request. No sibling. Smaller
#                  footprint, simpler ops, slower than the vLLM path.
#
#   Use the wrapper (`./scripts/mica-compose.sh up [--llama]`) to get the
#   pre-flight checks. The wrapper sets the vllm profile by default and
#   overrides MICA_DISABLE_LLAMA / LLAMA_URL when --llama is passed.
#
# Why split via profile, not separate compose files: the `mica` service
# definition is identical in both topologies. Only the SIBLING (and a
# handful of mica's env vars) differs. Profile-gating mica-vllm
# eliminates duplication; depends_on uses required:false so the mica
# service launches even when mica-vllm is filtered out.
#
# Why one Docker image for both: we always build with INSTALL_LLAMA=1
# so the image carries llama-server. Release mode just doesn't INVOKE
# it (MICA_DISABLE_LLAMA=1 + LLAMA_URL pointed at the sibling). The
# build cost is paid once; switching topologies needs no rebuild.
#
# cuDNN ABI note: vLLM's bundled cuDNN and the voice sidecars'
# torch-bundled cuDNN can't share an image without runtime mismatches
# (CUDNN_STATUS_SUBLIBRARY_VERSION_MISMATCH). vLLM topology separates
# them via the sibling; llama topology avoids the conflict by not
# running vLLM at all.
#
# Default workspace lives at $HOME/mica-workspace (matches install.sh) —
# deliberately OUTSIDE the cloned repo so user data doesn't mix with code
# and `git pull` can't accidentally touch your projects.

services:
  # One-shot init container: chowns the shared volumes to UID 1000 BEFORE
  # mica + mica-vllm start. Docker creates fresh named-volume mount points
  # as root:root by default; we need UID 1000 ownership so the two main
  # services (both running as UID 1000) can write to /cache/huggingface
  # and /project. Idempotent — fast no-op on subsequent boots when the
  # volumes are already owned correctly. The `:Z` flag and `--security-opt`
  # patterns aren't needed here (no SELinux contexts to relabel).
  mica-init:
    image: busybox:latest
    user: "0:0"  # explicitly root, to perform the chown
    # Explicit array form. Avoids YAML folded-scalar ambiguity that would
    # otherwise pass /cache/huggingface as a SEPARATE arg to sh (where it
    # becomes $0 of the script, NOT an arg to chown). Three list items =
    # exactly three argv to docker: sh, -c, <script-as-one-string>.
    command:
      - sh
      - -c
      - "chown -R ${USER_UID:-1000}:${USER_GID:-1000} /cache/huggingface /project /claude && echo 'mica-init: volume perms aligned'"
    volumes:
      - ${HF_CACHE_DIR:-mica-models}:/cache/huggingface
      - ${MICA_WORKSPACE:-${HOME}/mica-workspace}:/project
      - mica-claude:/claude
    restart: "no"

  mica:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Always build llama-server into the image so the same image
        # supports both topologies. vLLM topology doesn't INVOKE it
        # (MICA_DISABLE_LLAMA=1 by default below); llama topology uses
        # it on first chat dispatch. The ~5-10 min build cost is paid
        # once; switching topologies after that needs no rebuild.
        # Override INSTALL_LLAMA=0 if you know you'll ONLY use vLLM.
        INSTALL_LLAMA: "${INSTALL_LLAMA:-1}"
    image: mica:latest
    # Align with the common Linux host UID so files written into the
    # bind-mounted ./workspace and the shared HF cache end up owned by
    # the host user, not root. If your host UID differs, override
    # USER_UID/USER_GID via `.env` or shell env before `docker compose up`.
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    # Explicit public DNS. Docker otherwise copies the host's
    # /etc/resolv.conf verbatim; on hosts running systemd-resolved the
    # nameserver line is 127.0.0.53 (systemd's stub), which from inside
    # a container resolves to the CONTAINER'S own loopback where nothing
    # is listening — so external lookups (huggingface.co, raw.github,
    # npm registry, etc.) silently fail. Cloudflare + Google is a safe
    # default; override via MICA_DNS in .env if your network requires
    # internal resolvers.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      mica-init:
        condition: service_completed_successfully
      mica-vllm:
        # service_started (not service_healthy) is deliberate. The
        # devcontainer's scripts/start.sh spawns its chat-vllm sibling
        # detached and immediately starts the backend in parallel; the
        # voice-tts sidecar then gets to claim its CUDA slice DURING
        # vLLM's ~60-90 s weight-load window. If we gated on
        # service_healthy instead, mica wouldn't boot until vLLM had
        # already grown PyTorch's caching allocator to ~127 GiB of the
        # 130 GiB unified pool — and voice-tts would OOM at Kokoro's
        # CUDA init (3 GiB free isn't enough). Booting in parallel mirrors
        # the devcontainer race, which empirically works.
        # Chat requests during the ~60 s warmup will get 503s from the
        # backend's chat handlers, but that's a brief window before the
        # user starts interacting.
        #
        # required: false (compose 2.20+) lets `mica` start even when
        # mica-vllm is profile-filtered out (llama topology).
        condition: service_started
        required: false
    ports:
      - "${MICA_FRONTEND_PORT:-5173}:5173"   # Vite frontend
      - "${MICA_PORT:-${MICA_BACKEND_PORT:-3002}}:3002"  # Node backend API
      # llama-server inside the mica container (llama topology only).
      # In vllm topology this maps to nothing — harmless, just unused.
      - "${MICA_LLAMA_PORT:-8012}:8012"
    volumes:
      # Workspace projects — host-visible. Each subdir is a Mica project
      # (one chat, one canvas, optional cards). Default lives at
      # $HOME/mica-workspace to match install.sh's convention; deliberately
      # NOT inside the cloned repo (user data shouldn't mix with code, and
      # `git pull` shouldn't risk touching it). Override via MICA_WORKSPACE.
      # The wrapper (scripts/mica-compose.sh) pre-creates this with the
      # right ownership before compose runs.
      - ${MICA_WORKSPACE:-${HOME}/mica-workspace}:/project
      # HF model cache. Default = docker-managed named volume; override
      # via HF_CACHE_DIR=/path/on/host docker compose up to reuse an
      # existing host cache (skips re-download of any cached models).
      - ${HF_CACHE_DIR:-mica-models}:/cache/huggingface
      # Claude Code credentials, if you use the .claude card class.
      # Named volume so `claude login` state persists across restarts.
      - mica-claude:/home/vscode/.claude
    environment:
      # Image-agnostic HF cache path. Both `mica` and `mica-vllm` mount
      # the same volume here. Overrides each image's default user-home
      # cache so root-vs-non-root container users don't matter.
      HF_HOME: /cache/huggingface
      # LLAMA_URL: vllm topology points at the sibling; llama topology
      # points at localhost (llama-server inside this container). The
      # wrapper script sets this when --llama is passed.
      LLAMA_URL: "${LLAMA_URL:-http://mica-vllm:8000}"
      # MICA_DISABLE_LLAMA: vllm topology = 1 (don't spawn llama-server,
      # use the sibling). llama topology = 0 (backend auto-spawns
      # llama-server in-container on first chat). The wrapper script
      # sets this when --llama is passed.
      MICA_DISABLE_LLAMA: "${MICA_DISABLE_LLAMA:-1}"
      # Don't try to spawn a NESTED vLLM container from inside this one
      # (scripts/lib/vllm-container.sh is the devcontainer path; under
      # compose, the sibling service IS the vLLM in vllm topology, and
      # llama topology doesn't want vLLM at all).
      MICA_DISABLE_CHAT_VLLM: "1"
      PROJECT_DIR: /project
    env_file:
      # Optional. Loads TAVILY_API_KEY, OPENROUTER_API_KEY, HF_TOKEN,
      # etc. from the host .env if present; safe to ship without one.
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  mica-vllm:
    # Profile-gated: only starts when --profile vllm is active.
    # `mica-compose.sh up` sets that profile by default; `--llama` skips
    # it. With raw `docker compose up`, no profile is active and this
    # service is filtered out (llama topology).
    profiles: ["vllm"]
    # DEFAULT: digest-pinned. The base track is `vllm/vllm-openai:cu130-nightly`
    # (chosen for NVFP4 + MTP-1 spec decode + cu130 Blackwell readiness), but
    # that floating tag drifts — a fresh `docker pull` between Mica releases
    # could roll in an incompatible nightly under your feet. We pin a digest
    # we've smoke-tested with the current Mica so users get a known-good
    # configuration on `up` instead of "whatever upstream shipped today".
    #
    # To opt out (track nightly fresh): set MICA_VLLM_IMAGE before `up`:
    #   MICA_VLLM_IMAGE=vllm/vllm-openai:cu130-nightly ./scripts/mica-compose.sh up
    #
    # To bump the pin (do this intentionally, after smoke-testing):
    #   docker pull vllm/vllm-openai:cu130-nightly
    #   docker inspect --format '{{index .RepoDigests 0}}' vllm/vllm-openai:cu130-nightly
    # Paste the resulting `vllm/vllm-openai@sha256:...` below.
    image: ${MICA_VLLM_IMAGE:-vllm/vllm-openai@sha256:3dbe092ec5b2cef63b6104d33fa75d6ce53a7870962529ada69f78bbbc38e776}
    # vllm/vllm-openai's default ENTRYPOINT runs as root. Forcing UID 1000
    # (or whatever USER_UID is) keeps cache files it writes line-up with
    # what the Mica container writes, so the shared /cache/huggingface
    # mount has consistent ownership.
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    # Match scripts/start.sh's docker run flags for the devcontainer
    # mica-chat container — same vLLM image needs the same host-side
    # plumbing or behavior diverges. Specifically:
    #   - shm_size: 16g — Docker's default /dev/shm is 64 MB, far too
    #     small for vLLM's multi-process worker IPC. Without this, vLLM
    #     falls back to slower channels AND ends up retaining more in
    #     the GPU allocator (which is what was locking Kokoro out of
    #     CUDA at voice-tts spawn time).
    #   - ipc: host — use the host IPC namespace so vLLM's workers can
    #     mmap with each other directly. Standard vLLM recommendation.
    shm_size: 16g
    ipc: host
    # See `mica` service for rationale — first-run model pulls from HF
    # Hub need a working resolver, and the host's systemd-resolved stub
    # at 127.0.0.53 is unreachable from inside the container.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      mica-init:
        condition: service_completed_successfully
    environment:
      HF_HOME: /cache/huggingface
      # The vllm/vllm-openai image's /etc/passwd has no entry for UID 1000
      # (only root + system users), so when we force user: 1000 above,
      # PyTorch's cache-dir init calls getpass.getuser() →
      # pwd.getpwuid(1000) and KeyErrors. getpass.getuser() reads USER /
      # LOGNAME / LNAME / USERNAME env vars BEFORE the pwd lookup, so
      # setting USER to any non-empty string short-circuits cleanly.
      # HOME similarly fixes downstream calls that write to ~/.cache or
      # ~/.local — UID 1000 has no /home/* in this image.
      USER: vllm
      LOGNAME: vllm
      HOME: /tmp
    env_file:
      # Same .env as the mica service. Picks up HF_TOKEN if set
      # (authenticated HF requests = higher rate limits + access to
      # gated models like some Llama/Mistral variants). Optional;
      # the default model RedHatAI/Qwen3.6-35B-A3B-NVFP4 is public,
      # so anonymous downloads work — you'll just see HF Hub warnings
      # about unauthenticated requests in vLLM's startup logs.
      - path: .env
        required: false
    # Model as the first positional arg to `vllm serve` (the image's
    # ENTRYPOINT). The legacy `--model` flag still works but emits a
    # deprecation warning at startup and is slated for removal upstream.
    command: >
      RedHatAI/Qwen3.6-35B-A3B-NVFP4
      --served-model-name qwen-vl qwen-voice openai:qwen-vl qwen3-vl-local openai:qwen3-vl-local
      --host 0.0.0.0 --port 8000
      --quantization compressed-tensors
      --moe-backend flashinfer_cutlass
      --kv-cache-dtype fp8_e4m3
      --speculative-config '{"method":"mtp","num_speculative_tokens":1}'
      --gpu-memory-utilization 0.55
      --max-model-len 131072
      --max-num-batched-tokens 8192
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
      --default-chat-template-kwargs '{"enable_thinking": true, "preserve_thinking": true}'
      --limit-mm-per-prompt '{"image":4,"video":1}'
      --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"max_new_tokens":8192}'
    volumes:
      - ${HF_CACHE_DIR:-mica-models}:/cache/huggingface
    healthcheck:
      # Sibling `mica` service uses depends_on.condition: service_healthy
      # to wait for this before starting. 120s start period leaves room
      # for first-run model download on slow links; on cached runs the
      # service typically reaches ready in 30-60s.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mica-models:
  mica-claude:
