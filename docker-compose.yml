# Production-recommended Mica stack: two sibling containers.
#
#   mica       — frontend (Vite, :5173) + backend (Node, :3002) +
#                voice sidecars (Parakeet STT, Kokoro TTS, localhost only).
#                Builds from ./Dockerfile.
#
#   mica-vllm  — Qwen3.6-35B-A3B-NVFP4 served by upstream vLLM. Lives in
#                a sibling container (not co-located in `mica`) because
#                vLLM's bundled cuDNN and the voice sidecars' torch-bundled
#                cuDNN can't share an image without runtime ABI mismatches
#                (CUDNN_STATUS_SUBLIBRARY_VERSION_MISMATCH). Separate
#                containers, separate cuDNN, no conflict.
#
# Usage:
#   docker compose up                                          # default
#   MICA_WORKSPACE=/data/mica docker compose up                # custom workspace dir
#   HF_CACHE_DIR=$HOME/.cache/huggingface docker compose up    # reuse host HF cache
#   ./scripts/mica-compose.sh up                               # with preflight checks
#
# Default workspace lives at $HOME/mica-workspace (matches install.sh) —
# deliberately OUTSIDE the cloned repo so user data doesn't mix with code
# and `git pull` can't accidentally touch your projects.
#
# For a single-container alternative (no vLLM sibling, llama-cpp inside
# the mica container), see ./install.sh and ./scripts/mica.sh start —
# the existing "Open WebUI-shaped" install path. QUICKSTART.md documents
# both routes.

services:
  # One-shot init container: chowns the shared volumes to UID 1000 BEFORE
  # mica + mica-vllm start. Docker creates fresh named-volume mount points
  # as root:root by default; we need UID 1000 ownership so the two main
  # services (both running as UID 1000) can write to /cache/huggingface
  # and /project. Idempotent — fast no-op on subsequent boots when the
  # volumes are already owned correctly. The `:Z` flag and `--security-opt`
  # patterns aren't needed here (no SELinux contexts to relabel).
  mica-init:
    image: busybox:latest
    user: "0:0"  # explicitly root, to perform the chown
    # Explicit array form. Avoids YAML folded-scalar ambiguity that would
    # otherwise pass /cache/huggingface as a SEPARATE arg to sh (where it
    # becomes $0 of the script, NOT an arg to chown). Three list items =
    # exactly three argv to docker: sh, -c, <script-as-one-string>.
    command:
      - sh
      - -c
      - "chown -R ${USER_UID:-1000}:${USER_GID:-1000} /cache/huggingface /project /claude && echo 'mica-init: volume perms aligned'"
    volumes:
      - ${HF_CACHE_DIR:-mica-models}:/cache/huggingface
      - ${MICA_WORKSPACE:-${HOME}/mica-workspace}:/project
      - mica-claude:/claude
    restart: "no"

  mica:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Skip llama.cpp build in production. The compose stack uses
        # vLLM in the sibling `mica-vllm` service; llama-server inside
        # the mica image would never be reached (MICA_DISABLE_LLAMA=1
        # is set below). Skipping saves ~5-10 min of CUDA compile time
        # and avoids the libcuda.so.1 stub-linkage dance entirely.
        # The lean path (install.sh) leaves the default INSTALL_LLAMA=1
        # so its single-container topology still ships llama-server.
        INSTALL_LLAMA: "0"
    image: mica:latest
    # Align with the common Linux host UID so files written into the
    # bind-mounted ./workspace and the shared HF cache end up owned by
    # the host user, not root. If your host UID differs, override
    # USER_UID/USER_GID via `.env` or shell env before `docker compose up`.
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    # Explicit public DNS. Docker otherwise copies the host's
    # /etc/resolv.conf verbatim; on hosts running systemd-resolved the
    # nameserver line is 127.0.0.53 (systemd's stub), which from inside
    # a container resolves to the CONTAINER'S own loopback where nothing
    # is listening — so external lookups (huggingface.co, raw.github,
    # npm registry, etc.) silently fail. Cloudflare + Google is a safe
    # default; override via MICA_DNS in .env if your network requires
    # internal resolvers.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      mica-init:
        condition: service_completed_successfully
      mica-vllm:
        condition: service_healthy
    ports:
      - "${MICA_FRONTEND_PORT:-5173}:5173"   # Vite frontend
      - "${MICA_BACKEND_PORT:-3002}:3002"    # Node backend API
    volumes:
      # Workspace projects — host-visible. Each subdir is a Mica project
      # (one chat, one canvas, optional cards). Default lives at
      # $HOME/mica-workspace to match install.sh's convention; deliberately
      # NOT inside the cloned repo (user data shouldn't mix with code, and
      # `git pull` shouldn't risk touching it). Override via MICA_WORKSPACE.
      # The wrapper (scripts/mica-compose.sh) pre-creates this with the
      # right ownership before compose runs.
      - ${MICA_WORKSPACE:-${HOME}/mica-workspace}:/project
      # HF model cache. Default = docker-managed named volume; override
      # via HF_CACHE_DIR=/path/on/host docker compose up to reuse an
      # existing host cache (skips re-download of any cached models).
      - ${HF_CACHE_DIR:-mica-models}:/cache/huggingface
      # Claude Code credentials, if you use the .claude card class.
      # Named volume so `claude login` state persists across restarts.
      - mica-claude:/home/vscode/.claude
    environment:
      # Image-agnostic HF cache path. Both `mica` and `mica-vllm` mount
      # the same volume here. Overrides each image's default user-home
      # cache so root-vs-non-root container users don't matter.
      HF_HOME: /cache/huggingface
      # vLLM is the sibling service, not in this container.
      LLAMA_URL: http://mica-vllm:8000
      MICA_DISABLE_LLAMA: "1"
      # Don't try to spawn a NESTED vLLM container from inside this one
      # (scripts/lib/vllm-container.sh is the devcontainer path; under
      # compose, the sibling service IS the vLLM, so skip the helper).
      MICA_DISABLE_CHAT_VLLM: "1"
      PROJECT_DIR: /project
    env_file:
      # Optional. Loads TAVILY_API_KEY, OPENROUTER_API_KEY, etc. from
      # the host .env if present; safe to ship without one.
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  mica-vllm:
    # PRODUCTION: pin a captured digest, not the floating :cu130-nightly tag.
    # Capture via:
    #   docker pull vllm/vllm-openai:cu130-nightly
    #   docker inspect --format '{{index .RepoDigests 0}}' \
    #     vllm/vllm-openai:cu130-nightly
    # Paste the result below as `image: vllm/vllm-openai@sha256:...`. Update
    # intentionally (e.g. quarterly, or when a Mica change wants a newer
    # upstream fix) — after a smoke test. We use the nightly track for the
    # perf characteristics (NVFP4 + MTP-1 spec decode + cu130 Blackwell
    # readiness); the floating tag drifts, so digest-pin in production.
    #
    # Until a digest is captured for your deployment, the floating tag is
    # used as a fallback. Override via MICA_VLLM_IMAGE in your shell or .env.
    image: ${MICA_VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly}
    # vllm/vllm-openai's default ENTRYPOINT runs as root. Forcing UID 1000
    # (or whatever USER_UID is) keeps cache files it writes line-up with
    # what the Mica container writes, so the shared /cache/huggingface
    # mount has consistent ownership.
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    # See `mica` service for rationale — first-run model pulls from HF
    # Hub need a working resolver, and the host's systemd-resolved stub
    # at 127.0.0.53 is unreachable from inside the container.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      mica-init:
        condition: service_completed_successfully
    environment:
      HF_HOME: /cache/huggingface
      # The vllm/vllm-openai image's /etc/passwd has no entry for UID 1000
      # (only root + system users), so when we force user: 1000 above,
      # PyTorch's cache-dir init calls getpass.getuser() →
      # pwd.getpwuid(1000) and KeyErrors. getpass.getuser() reads USER /
      # LOGNAME / LNAME / USERNAME env vars BEFORE the pwd lookup, so
      # setting USER to any non-empty string short-circuits cleanly.
      # HOME similarly fixes downstream calls that write to ~/.cache or
      # ~/.local — UID 1000 has no /home/* in this image.
      USER: vllm
      LOGNAME: vllm
      HOME: /tmp
    env_file:
      # Same .env as the mica service. Picks up HF_TOKEN if set
      # (authenticated HF requests = higher rate limits + access to
      # gated models like some Llama/Mistral variants). Optional;
      # the default model RedHatAI/Qwen3.6-35B-A3B-NVFP4 is public,
      # so anonymous downloads work — you'll just see HF Hub warnings
      # about unauthenticated requests in vLLM's startup logs.
      - path: .env
        required: false
    command: >
      --model RedHatAI/Qwen3.6-35B-A3B-NVFP4
      --served-model-name qwen-vl qwen-voice openai:qwen-vl qwen3-vl-local openai:qwen3-vl-local
      --host 0.0.0.0 --port 8000
      --quantization compressed-tensors
      --moe-backend flashinfer_cutlass
      --kv-cache-dtype fp8_e4m3
      --speculative-config '{"method":"mtp","num_speculative_tokens":1}'
      --gpu-memory-utilization 0.55
      --max-model-len 131072
      --max-num-batched-tokens 16384
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
      --default-chat-template-kwargs '{"enable_thinking": true, "preserve_thinking": true}'
      --limit-mm-per-prompt '{"image":4,"video":1}'
      --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"max_new_tokens":8192}'
    volumes:
      - ${HF_CACHE_DIR:-mica-models}:/cache/huggingface
    healthcheck:
      # Sibling `mica` service uses depends_on.condition: service_healthy
      # to wait for this before starting. 120s start period leaves room
      # for first-run model download on slow links; on cached runs the
      # service typically reaches ready in 30-60s.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mica-models:
  mica-claude:
