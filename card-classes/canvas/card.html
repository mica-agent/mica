<div class="canvas-root">
    <div id="project-toolbar" class="project-toolbar"></div>
    <div class="canvas-body">
        <div id="canvas-freeform" class="canvas-freeform"></div>
    </div>
    <div class="project-empty" style="display: none;">
        No cards yet. Use the toolbar above to create your first card.
    </div>

    <!-- Meta overlay: hidden by default, shown via the toolbar's gear menu.
         #canvas-meta-list is the React portal target meta cards
         (canvas-back, skills) get rendered into. Keeping it inside a
         hidden overlay means React's portal logic still finds it and
         meta cards still render/initialize correctly — they're just not
         taking valuable canvas real estate until the user explicitly
         opens the overlay. -->
    <div id="canvas-meta-overlay" class="canvas-meta-overlay" style="display: none;">
        <div class="canvas-meta-overlay-backdrop"></div>
        <div class="canvas-meta-overlay-panel mica-resizable">
            <div class="canvas-meta-overlay-header">
                <span class="canvas-meta-overlay-title">Canvas settings</span>
                <button id="canvas-library-toggle" class="canvas-meta-overlay-btn" title="Make this project's card classes available to other projects on this machine">📚 Library: off</button>
                <button id="canvas-meta-overlay-close" class="canvas-meta-overlay-close" title="Close">&times;</button>
            </div>
            <div id="canvas-meta-list" class="canvas-meta-list"></div>
        </div>
    </div>
</div>
