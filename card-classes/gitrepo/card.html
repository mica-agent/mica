<div id="gr-root" class="gr-root">
  <div id="gr-header" class="gr-header">
    <span id="gr-branch" class="gr-branch">…</span>
    <span id="gr-counters" class="gr-counters"></span>
    <span class="gr-spacer"></span>
    <button id="gr-refresh" class="gr-btn" title="Refresh status">&#8634;</button>
    <button id="gr-pull" class="gr-btn" title="Pull (fast-forward only)">Pull</button>
    <button id="gr-push" class="gr-btn gr-btn--primary" title="Push to origin">Push</button>
  </div>

  <!-- Origin remote URL — shown after set-remote or on cloned repos.
       Hidden when no origin is configured. -->
  <div id="gr-origin" class="gr-origin" style="display:none;">
    <span class="gr-origin-label">origin:</span>
    <a id="gr-origin-url" class="gr-origin-url" target="_blank" rel="noopener noreferrer"></a>
  </div>

  <div id="gr-notgit" class="gr-notgit" style="display:none;">
    <div class="gr-notgit-title">Not a git repository</div>
    <div class="gr-notgit-body">This project has no <code>.git</code> directory yet. You can start tracking it here.</div>
    <button id="gr-init" class="gr-btn gr-btn--primary">git init</button>
  </div>

  <div id="gr-panels" class="gr-panels">
    <section class="gr-section" data-bucket="staged">
      <header class="gr-section-head">
        <span class="gr-section-title">Staged</span>
        <span class="gr-section-count" data-count></span>
      </header>
      <ul class="gr-list" data-list></ul>
    </section>
    <section class="gr-section" data-bucket="unstaged">
      <header class="gr-section-head">
        <span class="gr-section-title">Modified</span>
        <span class="gr-section-count" data-count></span>
        <button class="gr-section-stage-all" data-stage-all type="button">stage all</button>
      </header>
      <ul class="gr-list" data-list></ul>
    </section>
    <section class="gr-section" data-bucket="untracked">
      <header class="gr-section-head">
        <span class="gr-section-title">Untracked</span>
        <span class="gr-section-count" data-count></span>
        <button class="gr-section-stage-all" data-stage-all type="button">stage all</button>
      </header>
      <ul class="gr-list" data-list></ul>
    </section>
  </div>

  <div id="gr-commitbox" class="gr-commitbox">
    <textarea id="gr-commit-msg" class="gr-commit-msg" placeholder="Commit message" rows="2"></textarea>
    <button id="gr-commit" class="gr-btn gr-btn--primary" disabled>Commit</button>
  </div>

  <!-- Remote-setup flow: appears when Push is clicked but no remote is
       configured. User pastes an existing repo URL, or creates one on
       GitHub first (link below) and pastes it back. -->
  <div id="gr-remote-setup" class="gr-remote-setup" style="display:none;">
    <div class="gr-remote-setup-title">No remote configured</div>
    <div class="gr-remote-setup-body">
      Paste an existing repo URL, or
      <a id="gr-remote-create" href="https://github.com/new" target="_blank" rel="noopener noreferrer">create one on GitHub →</a>
      and paste the URL back here.
    </div>
    <input id="gr-remote-url" type="text" class="gr-remote-url" placeholder="https://github.com/user/repo.git" autocomplete="off" spellcheck="false" />
    <div class="gr-remote-actions">
      <button id="gr-remote-cancel" class="gr-btn">Cancel</button>
      <button id="gr-remote-submit" class="gr-btn gr-btn--primary">Set remote &amp; push</button>
    </div>
  </div>

  <div class="gr-log-head">
    <span class="gr-log-title">Activity</span>
    <button id="gr-log-clear" class="gr-log-clear" title="Clear activity log">Clear</button>
  </div>
  <div id="gr-log" class="gr-log"></div>

  <div id="gr-toast" class="gr-toast" style="display:none;"></div>
</div>
