<div id="shared-root" style="display:flex;flex-direction:column;flex:1;min-height:0;background:#0d1117;border-radius:6px;overflow:hidden;font-family:inherit;">

  <div id="shared-toolbar" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid #30363d;flex-shrink:0;">
    <input id="shared-search" type="text" placeholder="Filter by title, description, tag..." style="flex:1;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:3px 8px;color:#ccc;font-size:12px;outline:none;font-family:inherit;" />
    <span id="shared-count" style="color:#6e7681;font-size:11px;"></span>
  </div>

  <div id="shared-empty" style="display:none;color:#8b949e;font-size:12px;text-align:center;padding:24px;line-height:1.6;">
    <div style="margin-bottom:8px;font-weight:600;color:#c9d1d9;">No shared docs yet</div>
    <div>Workspace-shared docs live at <code style="background:#161b22;padding:1px 5px;border-radius:3px;">/workspaces/shared/</code>. Drop a markdown file there with frontmatter (<code style="background:#161b22;padding:1px 5px;border-radius:3px;">title</code>, <code style="background:#161b22;padding:1px 5px;border-radius:3px;">description</code>, <code style="background:#161b22;padding:1px 5px;border-radius:3px;">tags</code>) to make it pinnable from any project.</div>
  </div>

  <div id="shared-list" style="flex:1;overflow-y:auto;padding:6px 0;min-height:0;">
    <div style="color:#8b949e;font-size:12px;text-align:center;padding:16px;">Loading...</div>
  </div>

  <div id="shared-status" style="padding:4px 12px;font-size:11px;color:#6e7681;border-top:1px solid #30363d;min-height:18px;"></div>
</div>
