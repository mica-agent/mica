<div id="pc-root" style="display:flex;flex-direction:column;flex:1;min-height:0;font-family:inherit;color:#e6edf3;">
  <div id="pc-persona" style="padding:6px 10px;border-bottom:1px solid #30363d;font-size:11px;color:#8b949e;flex-shrink:0;">
    <span id="pc-persona-line">No persona set — edit this card's file to define one.</span>
  </div>
  <div id="pc-messages" style="flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px;"></div>
  <form id="pc-form" style="display:flex;gap:6px;padding:8px 12px;border-top:1px solid #30363d;flex-shrink:0;">
    <input id="pc-input" type="text" placeholder="Say something..." autocomplete="off"
      style="flex:1;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#e6edf3;font-size:13px;outline:none;font-family:inherit;" />
    <button id="pc-send" type="submit"
      style="background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Send</button>
  </form>
</div>
