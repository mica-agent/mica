<div id="cb-root" style="display:flex;flex-direction:column;flex:1;min-height:0;font-family:inherit;">

  <!-- Toolbar -->
  <div id="cb-toolbar" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;">
    <span style="color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Canvas back</span>
    <span title="Canvas-back is scoped to this canvas only — each project has its own. Other projects do not see edits made here." style="color:#6e7681;font-size:11px;cursor:help;border:1px solid rgba(255,255,255,0.15);border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;">i</span>
    <span id="cb-status" style="color:#6e7681;font-size:11px;flex:1;"></span>
    <div id="cb-idle-actions" style="display:flex;gap:4px;">
      <button id="cb-reset" title="Reset to template default" style="background:none;border:1px solid rgba(255,255,255,0.1);color:#8b949e;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;">Reset</button>
    </div>
    <div id="cb-pending-actions" style="display:none;gap:4px;">
      <button id="cb-reject" title="Discard the proposed changes" style="background:none;border:1px solid rgba(248,113,113,0.4);color:#f87171;border-radius:4px;padding:2px 10px;font-size:11px;cursor:pointer;font-family:inherit;">Reject</button>
      <button id="cb-apply" title="Apply the proposed changes (overwrites canvas-back)" style="background:#22c55e;border:none;color:#fff;border-radius:4px;padding:2px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">Apply</button>
    </div>
  </div>

  <!-- Body: editor (left) + agent compose (right) -->
  <div id="cb-body" style="flex:1;min-height:0;display:flex;overflow:hidden;">

    <!-- Editor area: in idle, just current. In pending, current (left, ro) + proposed (right). -->
    <div id="cb-editors" style="flex:1;min-width:0;display:flex;">
      <div id="cb-current-pane" style="flex:1;min-width:0;display:flex;flex-direction:column;">
        <div id="cb-current-label" style="display:none;padding:3px 10px;background:rgba(255,255,255,0.03);color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(255,255,255,0.06);">Current (read-only while reviewing)</div>
        <textarea id="cb-current" spellcheck="false" placeholder="Loading..." style="flex:1;min-height:0;background:transparent;color:#e6edf3;border:none;outline:none;padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.5;resize:none;tab-size:2;"></textarea>
      </div>
      <div id="cb-proposed-pane" style="display:none;flex:1;min-width:0;flex-direction:column;border-left:1px solid rgba(255,255,255,0.08);background:rgba(34,197,94,0.03);">
        <div style="padding:3px 10px;background:rgba(34,197,94,0.08);color:#4ade80;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(34,197,94,0.2);">Proposed</div>
        <textarea id="cb-proposed" spellcheck="false" readonly style="flex:1;min-height:0;background:transparent;color:#e6edf3;border:none;outline:none;padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.5;resize:none;tab-size:2;"></textarea>
      </div>
    </div>

    <!-- Compose sidebar -->
    <div id="cb-compose" style="width:30%;min-width:240px;border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;background:rgba(255,255,255,0.015);">
      <div style="padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <span style="color:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;flex:1;">Agent</span>
        <button id="cb-stop" title="Stop generation" style="display:none;background:#f87171;color:#fff;border:none;border-radius:4px;padding:1px 8px;font-size:10px;cursor:pointer;font-family:inherit;">Stop</button>
      </div>
      <div id="cb-chat" style="flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-height:0;">
        <div id="cb-chat-empty" style="color:#6e7681;font-size:11px;text-align:center;padding:14px 6px;line-height:1.45;">Ask the agent to refine canvas-back. The agent proposes a new version; you review and Apply or Reject. Nothing is saved without your click.</div>
      </div>
      <div style="padding:6px 10px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;">
        <textarea id="cb-prompt" placeholder="e.g. trim per-turn discipline; keep behavior" rows="2" style="width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:6px 8px;color:#e6edf3;font-size:11px;outline:none;font-family:inherit;resize:vertical;box-sizing:border-box;"></textarea>
        <button id="cb-send" style="margin-top:4px;width:100%;background:#3b82f6;color:#fff;border:none;border-radius:4px;padding:4px 0;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">Send</button>
      </div>
    </div>

  </div>
</div>
