<div class="card-markdown-editor">
  <div class="md-delta-badge" hidden>
    <button type="button" class="md-delta-trigger" aria-label="Last change summary">
      Δ <span class="md-delta-counts"></span>
    </button>
    <div class="md-delta-popover">
      <div class="md-delta-popover-body">
        <div class="md-delta-popover-title">Last update</div>
        <ul class="md-delta-list"></ul>
      </div>
    </div>
  </div>
  <div id="editor"></div>
</div>
