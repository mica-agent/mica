<div id="mmd-root" style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
  <div id="mmd-toolbar" style="display:flex;align-items:center;gap:4px;padding:4px 8px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);">
    <button id="mmd-zoomin" title="Zoom in" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#ccc;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:13px;">+</button>
    <button id="mmd-zoomout" title="Zoom out" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#ccc;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:13px;">-</button>
    <button id="mmd-reset" title="Reset view" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#ccc;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:12px;">R</button>
    <span id="mmd-zoom-label" style="color:#666;font-size:11px;margin-left:4px;">100%</span>
    <span style="flex:1;"></span>
    <span style="color:#555;font-size:10px;">Option+scroll: zoom | Option+drag: pan</span>
  </div>
  <div id="mmd-viewport" style="flex:1;min-height:0;overflow:hidden;position:relative;cursor:default;">
    <div id="mmd-svg" style="transform-origin:0 0;"></div>
  </div>
</div>
