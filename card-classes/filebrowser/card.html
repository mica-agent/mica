<div id="fb-root" class="fb-root">
  <div id="fb-tree" class="fb-tree" tabindex="0">
    <div id="fb-tree-header" class="fb-tree-header">
      <span class="fb-title">Project files</span>
      <button id="fb-refresh" class="fb-btn" title="Refresh listing">&#8634;</button>
    </div>
    <div id="fb-tree-body" class="fb-tree-body"></div>
    <div id="fb-drop-hint" class="fb-drop-hint">Drop files here to upload</div>
  </div>
  <div id="fb-preview" class="fb-preview">
    <div id="fb-preview-header" class="fb-preview-header">
      <span id="fb-preview-name" class="fb-preview-name">Select a file to preview</span>
      <span id="fb-preview-meta" class="fb-preview-meta"></span>
    </div>
    <div id="fb-preview-body" class="fb-preview-body"></div>
  </div>
</div>
