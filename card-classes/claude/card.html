<div id="chat-root" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;font-family:inherit;-webkit-font-smoothing:antialiased;">

  <div id="chat-topbar" style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid #30363d;flex-shrink:0;font-size:11px;color:#8b949e;min-width:0;">
    <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Claude Code</span>
    <span id="chat-fuel" title="" style="flex-shrink:0;display:none;align-items:center;gap:6px;cursor:help;">
      <span class="fuel-track" style="position:relative;width:44px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:visible;">
        <span class="fuel-fill" style="position:absolute;left:0;top:0;bottom:0;width:0%;background:#4ade80;border-radius:2px;transition:width 180ms ease,background 180ms ease;"></span>
        <span class="fuel-tick" style="position:absolute;left:50%;top:-1px;width:1px;height:6px;background:rgba(255,255,255,0.25);"></span>
        <span class="fuel-tick" style="position:absolute;left:80%;top:-1px;width:1px;height:6px;background:rgba(255,255,255,0.25);"></span>
      </span>
      <span id="chat-fuel-headroom" style="font-family:monospace;font-size:10px;color:#6e7681;"></span>
    </span>
    <span id="chat-archive-btn" title="Previous conversations on this card" style="cursor:pointer;color:#8b949e;font-size:13px;padding:0 2px;flex-shrink:0;">&#128336;</span>
    <span id="chat-clear-btn" title="Clear this card (archives the current conversation)" style="cursor:pointer;color:#8b949e;font-size:13px;padding:0 2px;flex-shrink:0;">&#128465;</span>
    <span id="chat-spawn-btn" title="Spawn a new chat card for a new topic" style="cursor:pointer;color:#8b949e;font-size:14px;padding:0 2px;flex-shrink:0;">+</span>
  </div>

  <div id="chat-archive-panel" style="display:none;position:absolute;top:32px;right:8px;width:280px;max-height:240px;overflow-y:auto;background:#1c2028;border:1px solid #30363d;border-radius:6px;padding:8px 10px;z-index:15;font-size:11px;color:#8b949e;box-shadow:0 4px 16px rgba(0,0,0,0.4);">
    <div style="color:#ccc;margin-bottom:6px;font-weight:600;">Previous conversations</div>
    <div id="chat-archive-list">Loading...</div>
  </div>

  <div id="chat-messages" style="flex:1;overflow-y:auto;padding:8px 12px;min-height:0;display:flex;flex-direction:column;gap:8px;">
    <div style="color:#8b949e;font-size:12px;text-align:center;padding:16px 0;">
      Send a message to start Claude Code.
    </div>
  </div>

  <div id="chat-statusbar" style="display:none;flex-shrink:0;">
    <div id="chat-status-main" style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid #30363d;font-size:12px;color:#8b949e;cursor:pointer;user-select:none;">
      <span id="chat-dot" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;"></span>
      <span id="chat-status-label" style="flex:1;"></span>
      <span id="chat-status-meta" style="flex-shrink:0;font-size:11px;"></span>
      <span id="chat-status-toggle" style="font-size:10px;color:#6e7681;margin-left:4px;">&#9660;</span>
    </div>
    <div id="chat-status-detail" style="display:none;max-height:150px;overflow-y:auto;padding:4px 12px 8px 28px;font-size:11px;font-family:monospace;color:#6e7681;border-top:1px solid rgba(48,54,61,0.5);"></div>
  </div>

<div style="display:flex;gap:6px;padding:8px 12px;border-top:1px solid #30363d;flex-shrink:0;">
    <input id="chat-input" type="text" placeholder="Ask Claude Code..." style="flex:1;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#e6edf3;font-size:13px;outline:none;font-family:inherit;" />
    <button id="chat-stop" style="background:#f87171;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:none;">Stop</button>
    <button id="chat-send" style="background:#7c3aed;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Send</button>
  </div>
</div>
