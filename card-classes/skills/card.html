<div id="skills-root" style="display:flex;flex-direction:column;flex:1;min-height:0;background:#0d1117;border-radius:6px;overflow:hidden;font-family:inherit;">

  <div id="skills-toolbar" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid #30363d;flex-shrink:0;">
    <input id="skills-search" type="text" placeholder="Filter..." style="flex:1;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:3px 8px;color:#ccc;font-size:12px;outline:none;font-family:inherit;" />
    <button id="skills-new" title="Create new skill" style="background:#3b82f6;color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">+ New</button>
  </div>

  <div id="skills-list" style="flex:1;overflow-y:auto;padding:8px 0;min-height:0;">
    <div style="color:#8b949e;font-size:12px;text-align:center;padding:16px;">Loading...</div>
  </div>

  <!-- Edit overlay -->
  <div id="skills-editor" style="display:none;position:absolute;inset:0;background:#0d1117;z-index:10;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid #30363d;flex-shrink:0;">
      <button id="skills-back" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:14px;padding:2px 8px;">&larr;</button>
      <span id="skills-edit-title" style="flex:1;color:#e6edf3;font-size:13px;font-weight:600;"></span>
      <button id="skills-delete" title="Delete" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:11px;padding:2px 8px;">Delete</button>
      <button id="skills-save" style="background:#22c55e;color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Save</button>
    </div>
    <div id="skills-body" style="flex:1;min-height:0;display:flex;overflow:hidden;">
      <textarea id="skills-content" spellcheck="false" style="flex:1;min-width:0;background:#0d1117;color:#e6edf3;border:none;outline:none;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:13px;line-height:1.5;resize:none;tab-size:2;"></textarea>
      <div id="skills-sidebar" style="width:32%;min-width:280px;display:flex;flex-direction:column;border-left:1px solid #30363d;background:#0b1017;">
        <div style="padding:6px 12px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:6px;flex-shrink:0;">
          <span style="color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;flex:1;">Agent</span>
          <button id="skills-compose-stop" title="Stop generation" style="display:none;background:#f87171;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;">Stop</button>
        </div>
        <div id="skills-chat" style="flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-height:0;">
          <div id="skills-chat-empty" style="color:#6e7681;font-size:12px;text-align:center;padding:16px 8px;line-height:1.5;">Ask the agent to draft or refine this skill. The agent rewrites the document on each turn — your hand-edits are preserved as context.</div>
        </div>
        <div style="padding:8px 10px;border-top:1px solid #30363d;flex-shrink:0;">
          <textarea id="skills-compose-input" placeholder="Ask agent..." rows="2" style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:6px 8px;color:#e6edf3;font-size:12px;outline:none;font-family:inherit;resize:vertical;box-sizing:border-box;"></textarea>
          <button id="skills-compose-send" style="margin-top:6px;width:100%;background:#3b82f6;color:#fff;border:none;border-radius:4px;padding:5px 0;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Send</button>
        </div>
      </div>
    </div>
    <div id="skills-status" style="padding:4px 12px;font-size:11px;color:#6e7681;border-top:1px solid #30363d;"></div>
  </div>
</div>
