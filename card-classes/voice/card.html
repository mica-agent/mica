<div class="vc-root">
  <div class="vc-header">
    <h2 class="vc-title">Voice</h2>
    <p class="vc-subtitle" id="vc-subtitle">Click the mic to turn it on. Speak whenever — Mica will hear each phrase and reply.</p>
  </div>

  <div class="vc-body">
    <div class="vc-status" id="vc-status" data-state="idle">Mic off</div>

    <button class="vc-talk" id="vc-talk" type="button" aria-label="Click to turn microphone on or off" data-mic="off">
      <span class="vc-talk-icon" id="vc-talk-icon">🎙️</span>
      <span class="vc-talk-label" id="vc-talk-label">Click to turn on</span>
    </button>

    <div class="vc-transcript-wrap" id="vc-transcript-wrap" style="display:none;">
      <div class="vc-transcript-label">You said</div>
      <div class="vc-transcript" id="vc-transcript">—</div>
    </div>

    <div class="vc-reply-wrap" id="vc-reply-wrap" style="display:none;">
      <div class="vc-reply-label-row">
        <div class="vc-reply-label">Mica</div>
        <button class="vc-stop-speaking" id="vc-stop-speaking" title="Stop speaking now (clears the audio queue)" type="button" style="display:none;">stop talking</button>
      </div>
      <div class="vc-reply" id="vc-reply">—</div>
    </div>

    <div class="vc-tools" id="vc-tools" style="display:none;">
      <div class="vc-tools-label">Routed</div>
      <div class="vc-tools-list" id="vc-tools-list"></div>
    </div>

    <audio class="vc-audio" id="vc-audio" preload="auto" style="display:none;"></audio>

    <div class="vc-meta" id="vc-meta">—</div>
  </div>
</div>
