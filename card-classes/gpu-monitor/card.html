<div class="gpu-monitor">
  <div class="gpu-name" id="gpu-name">Loading...</div>

  <div class="graph-row">
    <div class="graph-info">
      <div class="graph-label">GPU Utilization</div>
      <div class="current-value" id="gpu-value">--%</div>
    </div>
    <div class="graph-wrap">
      <canvas id="gpu-graph"></canvas>
    </div>
  </div>

  <div class="graph-row">
    <div class="graph-info">
      <div class="graph-label">System Memory</div>
      <div class="current-value" id="mem-value">--%</div>
    </div>
    <div class="graph-wrap">
      <canvas id="mem-graph"></canvas>
    </div>
  </div>

  <div class="graph-row">
    <div class="graph-info">
      <div class="graph-label">Temperature</div>
      <div class="current-value" id="temp-value">--°C / --°F</div>
    </div>
    <div class="graph-wrap">
      <canvas id="temp-graph"></canvas>
    </div>
  </div>

  <div class="graph-row">
    <div class="graph-info">
      <div class="graph-label">Power Draw</div>
      <div class="current-value" id="power-value">--W</div>
    </div>
    <div class="graph-wrap">
      <canvas id="power-graph"></canvas>
    </div>
  </div>
</div>
