<div id="html-card-root" style="position:relative;width:100%;height:100%;overflow:hidden;background:#0d1117;">
  <iframe id="html-card-frame"
          sandbox="allow-scripts"
          referrerpolicy="no-referrer"
          style="position:absolute;top:0;left:0;width:1280px;height:900px;transform-origin:top left;border:0;background:#fff;pointer-events:none;"></iframe>
  <div id="html-card-toolbar" style="position:absolute;top:6px;right:6px;display:flex;gap:4px;z-index:2;opacity:0;transition:opacity 120ms;">
    <button id="html-card-interact" title="Toggle interaction" style="background:rgba(13,17,23,0.85);color:#ccc;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;">Interact</button>
    <button id="html-card-open" title="Open in new tab" style="background:rgba(13,17,23,0.85);color:#ccc;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;">Open</button>
  </div>
</div>
